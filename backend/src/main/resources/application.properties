spring.datasource.url=jdbc:sqlserver://(localdb)\\localhost;databaseName=findhabitat;encrypt=true;trustServerCertificate=true;integratedSecurity=true;
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

  # ddl-auto option is convient for development, but should be disabled in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
server.port=8081

